<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>下一班校车 | Wulei Ebus</title>
  <meta name="description" content="下一班校车时间查询。">
  <link rel="icon" href="./assets/wulei-medal.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      color-scheme: dark light;
      --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo,
        Consolas, monospace;
      --bg: #0d0e10;
      --bg-lift: #151619;
      --surface: rgba(20, 21, 24, 0.88);
      --surface-strong: rgba(25, 26, 30, 0.96);
      --surface-soft: rgba(255, 255, 255, 0.035);
      --line: rgba(238, 241, 245, 0.1);
      --line-strong: rgba(238, 241, 245, 0.16);
      --text: #eef1f5;
      --muted: #8d939d;
      --muted-strong: #b4bac4;
      --accent-rgb: 42, 190, 176;
      --accent: rgb(var(--accent-rgb));
      --accent-soft: rgba(var(--accent-rgb), 0.12);
      --warn: #d4a72c;
      --danger: #e66555;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      --logo-image: url("./assets/wulei-medal-mono-dark.svg");
      --watermark-opacity: 0.045;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0d0e10;
      --bg-lift: #151619;
      --surface: rgba(20, 21, 24, 0.88);
      --surface-strong: rgba(25, 26, 30, 0.96);
      --surface-soft: rgba(255, 255, 255, 0.035);
      --line: rgba(238, 241, 245, 0.1);
      --line-strong: rgba(238, 241, 245, 0.16);
      --text: #eef1f5;
      --muted: #8d939d;
      --muted-strong: #b4bac4;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      --logo-image: url("./assets/wulei-medal-mono-dark.svg");
      --watermark-opacity: 0.045;
    }

    html[data-theme="light"] {
      color-scheme: light;
      --bg: #f4f1eb;
      --bg-lift: #ebe6dc;
      --surface: rgba(255, 252, 245, 0.88);
      --surface-strong: rgba(255, 252, 245, 0.96);
      --surface-soft: rgba(19, 23, 30, 0.035);
      --line: rgba(20, 24, 31, 0.12);
      --line-strong: rgba(20, 24, 31, 0.18);
      --text: #171a1f;
      --muted: #69707a;
      --muted-strong: #3d444e;
      --shadow: 0 28px 80px rgba(70, 61, 45, 0.18);
      --logo-image: url("./assets/wulei-medal-mono-light.svg");
      --watermark-opacity: 0.034;
    }

    @media (prefers-color-scheme: light) {
      html[data-theme="system"] {
        color-scheme: light;
        --bg: #f4f1eb;
        --bg-lift: #ebe6dc;
        --surface: rgba(255, 252, 245, 0.88);
        --surface-strong: rgba(255, 252, 245, 0.96);
        --surface-soft: rgba(19, 23, 30, 0.035);
        --line: rgba(20, 24, 31, 0.12);
        --line-strong: rgba(20, 24, 31, 0.18);
        --text: #171a1f;
        --muted: #69707a;
        --muted-strong: #3d444e;
        --shadow: 0 28px 80px rgba(70, 61, 45, 0.18);
        --logo-image: url("./assets/wulei-medal-mono-light.svg");
        --watermark-opacity: 0.034;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    html {
      background: var(--bg);
    }

    body {
      position: relative;
      min-width: 320px;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, var(--bg-lift) 0%, var(--bg) 46%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--font-mono);
      letter-spacing: 0;
    }

    body::before {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.38), transparent 72%);
      opacity: 0.28;
    }

    body::after {
      position: fixed;
      right: clamp(18px, 5vw, 78px);
      bottom: clamp(24px, 7vw, 92px);
      width: min(34vw, 320px);
      aspect-ratio: 1;
      background: var(--logo-image) center / contain no-repeat;
      content: "";
      opacity: var(--watermark-opacity);
      pointer-events: none;
    }

    .official-banner {
      position: relative;
      z-index: 2;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 84%, transparent);
      color: var(--muted);
      font-size: 0.82rem;
      backdrop-filter: blur(18px);
    }

    .official-inner {
      display: flex;
      min-height: 38px;
      align-items: center;
      gap: 10px;
      width: min(960px, calc(100vw - 40px));
      margin: 0 auto;
    }

    .logo-mark {
      display: inline-block;
      width: 26px;
      height: 26px;
      flex: 0 0 auto;
      background: var(--logo-image) center / contain no-repeat;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: calc(100vh - 38px);
      place-items: center;
      padding: clamp(14px, 3vw, 34px);
    }

    .terminal-shell {
      position: relative;
      width: min(480px, 100%);
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      background: linear-gradient(180deg, var(--surface-strong), var(--surface));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(140%);
    }

    .terminal-shell::before {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .terminal-bar {
      display: flex;
      min-height: 52px;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 84%, transparent);
      color: var(--muted);
    }

    .terminal-dots {
      display: inline-flex;
      gap: 8px;
    }

    .terminal-dots span {
      width: 11px;
      height: 11px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
    }

    .terminal-dots span:nth-child(1) {
      background: #ee6a5f;
    }

    .terminal-dots span:nth-child(2) {
      background: #e0b84a;
    }

    .terminal-dots span:nth-child(3) {
      background: var(--accent);
    }

    .brand {
      display: flex;
      min-width: 0;
      flex: 1;
      align-items: center;
      gap: 10px;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      overflow: hidden;
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-subtitle {
      overflow: hidden;
      color: var(--muted);
      font-size: 0.72rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .terminal-status {
      color: var(--accent);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .theme-toggle {
      display: inline-grid;
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      cursor: pointer;
      color: var(--muted-strong);
      transition:
        border-color 160ms ease,
        color 160ms ease,
        transform 160ms ease,
        background 160ms ease;
    }

    .theme-toggle:hover {
      border-color: rgba(var(--accent-rgb), 0.55);
      background: var(--accent-soft);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .content {
      position: relative;
      padding: 28px;
      text-align: center;
    }

    h1 {
      position: relative;
      margin: 0 0 22px;
      color: var(--text);
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1.15;
    }

    .result-card {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 24px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .label-line,
    .meta-line,
    .footer-note {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.5;
    }

    .next-bus {
      color: var(--accent);
      font-size: clamp(3.8rem, 14vw, 5.8rem);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .tip {
      min-height: 1.5em;
      color: var(--muted-strong);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .meta-line span {
      color: var(--muted-strong);
    }

    .footer-note {
      margin: 18px 0 0;
    }

    @media (max-width: 560px) {
      .official-inner {
        width: min(100vw - 24px, 960px);
      }

      .app-shell {
        align-items: start;
        min-height: calc(100vh - 38px);
        padding: 10px;
      }

      .terminal-shell {
        min-height: calc(100vh - 58px);
        border-radius: 14px;
      }

      .terminal-status {
        display: none;
      }

      .content {
        display: grid;
        min-height: calc(100vh - 112px);
        align-content: center;
        padding: 22px 16px;
      }
    }
  </style>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("ebusTheme") || "system";
        document.documentElement.dataset.theme = theme;
      } catch {
        document.documentElement.dataset.theme = "system";
      }
    })();
  </script>
</head>
<body>
  <div class="official-banner" role="note">
    <div class="official-inner">
      <span class="logo-mark" aria-hidden="true"></span>
      <span>This is an official website of Wulei Org.</span>
    </div>
  </div>

  <main class="app-shell">
    <section class="terminal-shell" aria-labelledby="page-title">
      <div class="terminal-bar">
        <div class="terminal-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="brand" aria-label="Wulei Ebus">
          <span class="logo-mark" aria-hidden="true"></span>
          <div class="brand-copy">
            <div class="brand-title">WULEI.ORG</div>
            <div class="brand-subtitle">leiwu@ebus:~</div>
          </div>
        </div>
        <div class="terminal-status">shuttle monitor</div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme" title="theme system">
          S
        </button>
      </div>

      <div class="content">
        <h1 id="page-title">下一班校车</h1>

        <div class="result-card">
          <p class="label-line">当前时间：<span id="current-time">--:--</span></p>
          <p id="next-bus-text" class="next-bus">--:--</p>
          <p id="extra-tip" class="tip"></p>
          <p class="meta-line">
            <span id="current-station-label">如意公寓</span> ·
            <span id="current-daytype-label">工作日</span>
          </p>
        </div>

        <p class="footer-note">Lei ♥ Hani</p>
      </div>
    </section>
  </main>

  <script>
    const timetableConfig = {
      ruyi: {
        workday: [
          "07:10","07:40",
          "08:00","08:15","08:30","09:00",
          "09:10","10:10","11:10","12:10",
          "13:00","13:10","13:30","14:00",
          "14:10","15:10","16:10","17:10",
          "18:00","18:15","18:30","19:00",
          "19:10","20:10","21:10","22:10"
        ],
        weekend: [
          "07:10","07:40","08:40","09:40",
          "10:40","11:40","12:40","13:40",
          "14:40","15:40","16:40","17:40",
          "18:40","19:40","20:40","21:40",
          "22:40"
        ]
      },
      daoyuan: {
        workday: [
          "08:00","08:30","09:00","09:30",
          "10:00","10:30","11:00","11:30",
          "12:00","12:15","12:30","12:45",
          "13:00","13:30","14:00","14:30",
          "15:00","15:30","16:00","16:30",
          "17:00","17:15","17:30","17:45",
          "18:00","18:30","19:00","19:30",
          "20:00","20:30","21:00","21:15",
          "21:30","21:45","22:00","22:30",
          "23:00"
        ],
        weekend: [
          "08:00","09:00","10:00","11:00",
          "12:00","13:00","14:00","15:00",
          "16:00","17:00","18:00","19:00",
          "20:00","21:00","22:00","23:00"
        ]
      }
    };

    let currentStation = "ruyi";
    let currentDayType = "workday";
    let dayTypeCode = 0;

    function getBeijingTime() {
      const now = new Date();
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(now);
    }

    function timeToMinutes(timeStr) {
      const [h, m] = timeStr.split(":").map(Number);
      return h * 60 + m;
    }

    function getCurrentMinutes() {
      const [h, m] = getBeijingTime().split(":").map(Number);
      return h * 60 + m;
    }

    function getBeijingDate() {
      const now = new Date();
      return new Intl.DateTimeFormat("sv-SE", {
        timeZone: "Asia/Shanghai"
      }).format(now);
    }

    async function checkHoliday() {
      try {
        const today = getBeijingDate();
        const response = await fetch(`https://timor.tech/api/holiday/info/${today}`);
        const data = await response.json();
        dayTypeCode = data.type.type;
        return data.type.type === 1 || data.type.type === 2;
      } catch (error) {
        alert("节假日查询API不可用，将按工作日计算");
        return false;
      }
    }

    function getCurrentLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("浏览器不支持地理定位"));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const ruyiCoords = { lat: 22.704486, lng: 114.208642 };
            const daoyuanCoords = { lat: 22.686922, lng: 114.21231 };
            const distToRuyi = Math.sqrt(
              Math.pow(lat - ruyiCoords.lat, 2) + Math.pow(lng - ruyiCoords.lng, 2)
            );
            const distToDaoyuan = Math.sqrt(
              Math.pow(lat - daoyuanCoords.lat, 2) + Math.pow(lng - daoyuanCoords.lng, 2)
            );
            resolve(distToRuyi <= distToDaoyuan ? "ruyi" : "daoyuan");
          },
          (error) => {
            reject(new Error(`定位失败: ${error.code}`));
          },
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 300000
          }
        );
      });
    }

    function getDayTypeLabel() {
      switch (dayTypeCode) {
        case 0:
          return "工作日";
        case 1:
          return "周末";
        case 2:
          return "节假日";
        case 3:
          return "调休补班";
        default:
          return currentDayType === "workday" ? "工作日" : "周末";
      }
    }

    function calcNextBus() {
      document.getElementById("current-time").textContent = getBeijingTime();

      const timetable = timetableConfig[currentStation][currentDayType];
      const nowMin = getCurrentMinutes();
      let nextBus = null;

      for (const time of timetable) {
        if (timeToMinutes(time) > nowMin) {
          nextBus = time;
          break;
        }
      }

      const nextBusEl = document.getElementById("next-bus-text");
      const tipEl = document.getElementById("extra-tip");

      if (nextBus) {
        nextBusEl.textContent = nextBus;
        const minutesLeft = timeToMinutes(nextBus) - nowMin;
        if (minutesLeft <= 2) {
          tipEl.textContent = "马上就要发车了！";
        } else if (minutesLeft <= 10) {
          tipEl.textContent = `${minutesLeft} 分钟后发车`;
        } else {
          tipEl.textContent = `还有 ${minutesLeft} 分钟`;
        }
      } else {
        nextBusEl.textContent = "无班次";
        tipEl.textContent = "今日班车已结束";
      }

      document.getElementById("current-station-label").textContent =
        currentStation === "ruyi" ? "如意公寓" : "道远楼东";
      document.getElementById("current-daytype-label").textContent = getDayTypeLabel();
    }

    async function initApp() {
      try {
        currentStation = await getCurrentLocation();
        currentDayType = (await checkHoliday()) ? "weekend" : "workday";
      } catch {
        currentStation = "ruyi";
        currentDayType = "workday";
      }

      calcNextBus();
      setInterval(calcNextBus, 60 * 1000);

      setInterval(async () => {
        try {
          const newStation = await getCurrentLocation();
          if (newStation !== currentStation) {
            currentStation = newStation;
            calcNextBus();
          }
        } catch {
          // Keep the last known station if periodic location refresh fails.
        }
      }, 10 * 60 * 1000);
    }

    window.addEventListener("DOMContentLoaded", initApp);

    const themeToggle = document.getElementById("theme-toggle");
    const themeOrder = ["system", "dark", "light"];

    function applyTheme(theme) {
      const nextTheme = themeOrder.includes(theme) ? theme : "system";
      document.documentElement.dataset.theme = nextTheme;
      if (themeToggle) {
        themeToggle.textContent = nextTheme === "dark" ? "D" : nextTheme === "light" ? "L" : "S";
        themeToggle.title = `theme ${nextTheme}`;
      }
      try {
        localStorage.setItem("ebusTheme", nextTheme);
      } catch {
        // Theme still applies for this page view.
      }
    }

    if (themeToggle) {
      applyTheme(document.documentElement.dataset.theme || "system");
      themeToggle.addEventListener("click", () => {
        const current = document.documentElement.dataset.theme || "system";
        const next = themeOrder[(themeOrder.indexOf(current) + 1) % themeOrder.length];
        applyTheme(next);
      });
    }
  </script>
</body>
</html>
